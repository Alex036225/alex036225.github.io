<script src="assets/js/main.min.js"></script>

<script>
  (function () {
    var masthead = document.querySelector(".masthead");
    var navLinks = Array.prototype.slice.call(document.querySelectorAll(".greedy-nav a[href*='#']"));
    var sectionMap = [];

    function normalizePath(path) {
      if (!path) return "/";
      return path.length > 1 ? path.replace(/\/+$/, "") : path;
    }

    function currentPathname() {
      return normalizePath(window.location.pathname);
    }

    function getTargetId(link) {
      try {
        var url = new URL(link.getAttribute("href"), window.location.origin);
        if (normalizePath(url.pathname) !== currentPathname()) return null;
        return url.hash ? decodeURIComponent(url.hash.slice(1)) : null;
      } catch (error) {
        return null;
      }
    }

    function refreshSectionMap() {
      sectionMap = navLinks
        .map(function (link) {
          var id = getTargetId(link);
          var section = id ? document.getElementById(id) : null;
          return id && section ? { id: id, section: section } : null;
        })
        .filter(Boolean);
    }

    function updateMastheadState() {
      if (!masthead) return;
      masthead.classList.toggle("masthead--scrolled", window.scrollY > 8);
    }

    function setActiveLink(activeId) {
      navLinks.forEach(function (link) {
        var isActive = getTargetId(link) === activeId;
        link.classList.toggle("is-active", Boolean(isActive));
      });
    }

    function updateActiveSection() {
      if (!sectionMap.length) return;

      var mastheadOffset = masthead ? masthead.offsetHeight : 0;
      var marker = window.scrollY + mastheadOffset + 24;
      var activeId = sectionMap[0].id;

      sectionMap.forEach(function (item) {
        if (marker >= item.section.offsetTop) {
          activeId = item.id;
        }
      });

      setActiveLink(activeId);
    }

    function initRevealAnimations() {
      var cards = document.querySelectorAll(".page__content .paper-box, .page__content .profile-card");
      if (!cards.length) return;

      if (!("IntersectionObserver" in window)) {
        cards.forEach(function (card) { card.classList.add("is-visible"); });
        return;
      }

      var observer = new IntersectionObserver(
        function (entries, io) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add("is-visible");
              io.unobserve(entry.target);
            }
          });
        },
        {
          threshold: 0.12,
          rootMargin: "0px 0px -8% 0px"
        }
      );

      cards.forEach(function (card) { observer.observe(card); });
    }

    var ticking = false;
    function onScroll() {
      if (!ticking) {
        window.requestAnimationFrame(function () {
          updateMastheadState();
          updateActiveSection();
          ticking = false;
        });
        ticking = true;
      }
    }

    refreshSectionMap();
    updateMastheadState();
    updateActiveSection();
    initRevealAnimations();

    window.addEventListener("scroll", onScroll, { passive: true });
    window.addEventListener("resize", function () {
      refreshSectionMap();
      updateActiveSection();
      updateMastheadState();
    });
  })();
</script>
